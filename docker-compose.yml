services:
  pallas:
    build:
      context: .
      args:
        VERSION: ${PALLAS_VERSION:-latest}
    container_name: pallas
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
      - "127.0.0.1:${METRICS_PORT:-9100}:${METRICS_PORT:-9100}"
    env_file:
      - .env
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 8G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${METRICS_PORT:-9100}/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
